# Config for synthetic_data_generation/slam/generate_slam_data.py
# Keys correspond 1:1 to the script's CLI flags (dashes -> underscores).
# CLI flags override these values.
backend: mock            # mock | isaac
num_envs: 4
num_episodes: 10
max_steps: 400
policy: scripted_goal    # random | zero | scripted_goal
pose_noise_std: 0.005
seed: 42
output_dir: data/synthetic/slam_go2