# Scenario suite: mock corridor navigation (runs on the MockSimulatorAdapter).
#
# Nominal scenarios train/measure baseline behavior; perturbed scenarios are
# reserved for robustness evaluation (exposé §4.4 / §4.7). The same schema is
# interpreted by the Isaac adapters once wired: `scene` then names a USD stage
# and `robot` a real embodiment asset (e.g. Unitree Go2).

scenarios:
  - scenario_id: corridor_nominal_short
    scene: mock/corridor_v1
    robot: unitree_go2
    spawn_pose: [0.0, 0.0, 0.0]
    goal_position: [3.0, 2.0, 0.0]
    goal_radius: 0.5
    instruction: "Move to the target zone at the end of the corridor."
    max_steps: 200
    tags: [nominal]

  - scenario_id: corridor_nominal_long
    scene: mock/corridor_v1
    robot: unitree_go2
    spawn_pose: [0.0, 0.0, 0.0]
    goal_position: [5.0, 5.0, 0.0]
    goal_radius: 0.5
    instruction: "Navigate to the goal marker near the far wall."
    max_steps: 300
    tags: [nominal]

  - scenario_id: corridor_goal_shift
    scene: mock/corridor_v1
    robot: unitree_go2
    spawn_pose: [0.0, 0.0, 0.0]
    goal_position: [3.0, 2.0, 0.0]
    goal_radius: 0.5
    instruction: "Move to the target zone at the end of the corridor."
    max_steps: 300
    tags: [perturbed]
    perturbations:
      - kind: goal_shift
        onset_step: 20
        params: { dx: 1.5, dy: -1.0 }

  - scenario_id: corridor_actuator_dropout
    scene: mock/corridor_v1
    robot: unitree_go2
    spawn_pose: [0.0, 0.0, 0.0]
    goal_position: [3.0, 2.0, 0.0]
    goal_radius: 0.5
    instruction: "Move to the target zone at the end of the corridor."
    max_steps: 300
    tags: [perturbed]
    perturbations:
      - kind: actuator_dropout
        onset_step: 15
        params: { duration: 20 }

  - scenario_id: corridor_sensor_noise
    scene: mock/corridor_v1
    robot: unitree_go2
    spawn_pose: [0.0, 0.0, 0.0]
    goal_position: [3.0, 2.0, 0.0]
    goal_radius: 0.5
    instruction: "Move to the target zone at the end of the corridor."
    max_steps: 300
    tags: [perturbed]
    perturbations:
      - kind: sensor_noise
        onset_step: 10
        params: { std: 0.02 }